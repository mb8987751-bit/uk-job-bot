job_search:
  linkedin:
    enabled: true
    keywords:
      - "data entry"
      - "virtual assistant"
      - "customer service"
      - "admin assistant"
      - "content moderator"
      - "chat support"
      - "call centre"
      - "transcriptionist"
      - "copywriter"
      - "online researcher"
      - "social media assistant"
      - "email support"
      - "appointment setter"
      - "data processor"
      - "proofreader"
      - "order processing"
      - "entry level"
      - "remote assistant"
      - "graduate"
      - "trainee"
    location: "United Kingdom"
    work_type: "remote"
    experience_level: ["entry", "internship"]
    job_type: ["full-time", "part-time", "contract"]
    date_posted: "past_week"
    max_applications_per_run: 150

  indeed:
    enabled: false
    keywords:
      - "software engineer"
      - "junior developer"
      - "graduate"
      - "entry level"
    location: "United Kingdom"
    remote_only: true
    experience_level: "entry"
    date_posted: "last_7_days"
    max_applications_per_run: 0

bot_settings:
  headless: true
  human_delay_min: 3
  human_delay_max: 7
  max_daily_applications: 200
  session_timeout_minutes: 90

resume:
  template_path: "assets/resume_template.pdf"
  output_dir: "data/generated_resumes"

logging:
  level: "INFO"
  file: "data/bot.log"
