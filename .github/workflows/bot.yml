name: UK Job Auto-Apply Bot

on:
  schedule:
    - cron: '0 8,14,20 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}

      - name: Cache LinkedIn session
        uses: actions/cache@v4
        with:
          path: data/linkedin_session
          key: linkedin-session-${{ runner.os }}-${{ hashFiles('data/linkedin_cookies.json') }}
          restore-keys: |
            linkedin-session-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Create .env file
        run: |
          echo "LINKEDIN_EMAIL=${{ secrets.LINKEDIN_EMAIL }}" >> .env
          echo "LINKEDIN_PASSWORD=${{ secrets.LINKEDIN_PASSWORD }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "FULL_NAME=${{ secrets.FULL_NAME }}" >> .env
          echo "PHONE=${{ secrets.PHONE }}" >> .env
          echo "EMAIL=${{ secrets.EMAIL }}" >> .env
          echo "CITY=${{ secrets.CITY }}" >> .env
          echo "PLAYWRIGHT_USER_DATA_DIR=data/linkedin_session" >> .env

      - name: Restore LinkedIn cookies
        run: |
          if [ -n "${{ secrets.LINKEDIN_COOKIES }}" ] && [ ! -f data/linkedin_session/Default/Cookies ]; then
            mkdir -p data
            echo "${{ secrets.LINKEDIN_COOKIES }}" | base64 -d > data/linkedin_cookies.json
            echo "Cookies restored for bootstrap"
          else
            echo "Using cached session or no cookies secret"
          fi

      - name: Run bot
        run: python main.py

      - name: Upload application data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: application-data
          path: |
            data/exports/*.csv
            data/applications.db
          retention-days: 7

      - name: Commit application log
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/exports/*.csv data/applications.db -f || true
          git diff --cached --quiet || git commit -m "Auto-update: application data $(date +'%Y-%m-%d %H:%M')"
          git push || echo "No changes to push or push failed"
